<div id="cookie-banner" class="cookie-banner" role="region" aria-label="Cookie consent" hidden>
  <div class="cookie-banner__inner">
    <p class="cookie-banner__text">
      We use cookies to analyze site usage and improve your experience. You can accept or reject analytics cookies.
    </p>
    <div class="cookie-banner__actions">
      <button type="button" id="cookie-banner-reject" class="btn btn-md btn-secondary cookie-banner__btn">Reject</button>
      <button type="button" id="cookie-banner-accept" class="btn btn-md btn-primary cookie-banner__btn">Accept</button>
    </div>
  </div>
</div>
