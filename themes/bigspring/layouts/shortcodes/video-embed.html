{{- $src := .Get "src" | default (.Get 0) -}}
{{- $title := .Get "title" | default "Video player" -}}
<div class="embed-16x9">
  <iframe src="{{ $src | safeURL }}" title="{{ $title }}" loading="lazy" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
</div>
